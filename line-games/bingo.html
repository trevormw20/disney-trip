  <meta name="theme-color" content="#0b1d3a" />

<body>
  <main>
    <div class="topbar">
      <a class="back-btn" href="index.html">← Menu</a>
      <div class="title-bar">🎯 Ride Wait Bingo</div>
      <div style="width:64px;"></div>
    </div>

    <!-- Setup -->
    <section id="setup" class="section">
      <div class="card">
        <h2 style="margin-bottom:0.6rem;">How to Play</h2>
        <p style="color:var(--muted); font-size:0.95rem; line-height:1.4;">
          Pick the ride line you're in. Phone shows a 3×3 bingo card with stuff to spot in the queue. Tap a square when you see it. Get 3 in a row to win!
        </p>
      </div>

      <h3 style="margin:1.2rem 0 0.6rem; font-size:1rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Pick Your Ride</h3>
      <div id="rideList" style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;"></div>
    </section>

    <!-- Play -->
    <section id="play" class="section hidden">
      <div class="stat-row">
        <div class="stat-pill" id="ridePill">🎢</div>
        <div class="stat-pill" id="markedPill">⭐ 0/9</div>
      </div>

      <div id="bingoGrid" class="bingo"></div>

      <div id="winBanner" class="hidden card" style="text-align:center; background:linear-gradient(135deg, #fbbf24, #ec4899); border:none; margin-bottom:0.8rem;">
        <div style="font-size:2rem;">🎉 BINGO! 🎉</div>
        <div style="font-size:0.95rem; margin-top:0.3rem;">You got 3 in a row!</div>
      </div>

      <button class="btn btn-primary btn-block" onclick="newCard()">🔀 New Card (Same Ride)</button>
      <button class="btn btn-ghost btn-block" onclick="backToSetup()" style="margin-top:0.5rem;">← Pick Different Ride</button>
    </section>
  </main>

    let currentRideKey = 'general';
    let card = []; // 9 items
    let marked = []; // 9 booleans
    let won = false;

    function shuffle(arr) { const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

    function renderRideList() {
      const list = document.getElementById('rideList');
      list.innerHTML = '';
      Object.entries(RIDES).forEach(([key, r]) => {
        const b = document.createElement('button');
        b.className = 'btn btn-ghost';
        b.style.padding = '1rem 0.6rem';
        b.style.flexDirection = 'column';
        b.style.lineHeight = '1.2';
        b.innerHTML = `<div style="font-size:1.6rem; margin-bottom:0.2rem;">${r.emoji}</div><div style="font-size:0.8rem; font-weight:700;">${r.name}</div>`;
        b.onclick = () => pickRide(key);
        list.appendChild(b);
      });
    }
    renderRideList();

    function pickRide(key) {
      currentRideKey = key;
      newCard();
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('play').classList.remove('hidden');
    }

    function newCard() {
      const r = RIDES[currentRideKey];
      const pool = shuffle(r.items);
      // 8 items + 1 free space in the middle
      const picks = pool.slice(0, 8);
      // build 3x3 with free at index 4
      card = [picks[0], picks[1], picks[2], picks[3], 'FREE ⭐', picks[4], picks[5], picks[6], picks[7]];
      marked = [false, false, false, false, true, false, false, false, false];
      won = false;
      document.getElementById('ridePill').textContent = r.emoji + ' ' + r.name;
      document.getElementById('winBanner').classList.add('hidden');
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('bingoGrid');
      grid.innerHTML = '';
      card.forEach((item, i) => {
        const cell = document.createElement('div');
        cell.className = 'bingo-cell' + (marked[i] ? ' marked' : '') + (i === 4 ? ' free' : '');
        cell.textContent = item;
        cell.onclick = () => toggle(i);
        grid.appendChild(cell);
      });
      const c = marked.filter(Boolean).length;
      document.getElementById('markedPill').textContent = '⭐ ' + c + '/9';
      checkWin();
    }

    function toggle(i) {
      if (i === 4) return; // free space stays
      marked[i] = !marked[i];
      renderGrid();
    }

    function checkWin() {
      const lines = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
      ];
      const wins = lines.some(l => l.every(idx => marked[idx]));
      if (wins && !won) {
        won = true;
        document.getElementById('winBanner').classList.remove('hidden');
        if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
      }
    }

    function backToSetup() {
      document.getElementById('play').classList.add('hidden');
      document.getElementById('setup').classList.remove('hidden');
    }
