<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b1d3a" />
  <title>Higher or Lower — Disney</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div class="topbar">
      <a class="back-btn" href="index.html">← Menu</a>
      <div class="title-bar">📊 Higher or Lower</div>
      <div style="width:64px;"></div>
    </div>

    <section id="setup" class="section">
      <div class="card">
        <h2 style="margin-bottom:0.6rem;">How to Play</h2>
        <p style="color:var(--muted); font-size:0.95rem; line-height:1.4;">
          Phone shows a Disney fact and number. Group decides together if the next item is HIGHER or LOWER. One person taps. 10 rounds — most correct wins!
        </p>
      </div>

      <h3 style="margin:1.2rem 0 0.6rem; font-size:1rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Pick a Topic</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.6rem;">
        <button class="btn btn-primary" onclick="startGame('movieYears')">📅 Movie Release Years</button>
        <button class="btn btn-success" onclick="startGame('boxOffice')">💰 Movie Box Office ($M)</button>
        <button class="btn btn-warn" onclick="startGame('rideYears')">🎢 Ride Opening Years</button>
        <button class="btn" onclick="startGame('rideHeights')">📏 Ride Drop Heights (ft)</button>
        <button class="btn btn-primary" onclick="startGame('rideLengths')">⏱ Ride Length (sec)</button>
        <button class="btn btn-success" onclick="startGame('parkSize')">🌳 Park Size (acres)</button>
      </div>
    </section>

    <section id="play" class="section hidden">
      <div class="stat-row">
        <div class="stat-pill" id="roundPill">Round 1 / 10</div>
        <div class="stat-pill" id="scorePill">✅ 0</div>
      </div>

      <div class="big-card" style="min-height:auto; padding:1.5rem 1rem;">
        <div class="label" id="topicLabel">TOPIC</div>
        <div style="font-size:3.5rem;" id="leftEmoji">🎬</div>
        <div class="prompt" id="leftName" style="font-size:clamp(1.2rem, 4.5vw, 1.6rem); margin:0.3rem 0;">Item</div>
        <div style="font-size:2.4rem; font-weight:800; color:var(--gold);" id="leftValue">—</div>
        <div class="sub" style="margin-top:0.4rem; font-weight:700; color:var(--gold);">VS</div>
        <div style="font-size:3.5rem; margin-top:0.3rem;" id="rightEmoji">❓</div>
        <div class="prompt" id="rightName" style="font-size:clamp(1.2rem, 4.5vw, 1.6rem); margin:0.3rem 0;">Mystery item</div>
        <div style="font-size:2.4rem; font-weight:800; color:var(--gold);" id="rightValue">?</div>
      </div>

      <div id="guessBtns" class="btn-row">
        <button class="btn btn-danger btn-lg" onclick="guess('lower')">⬇ Lower</button>
        <button class="btn btn-success btn-lg" onclick="guess('higher')">⬆ Higher</button>
      </div>

      <div id="resultBox" class="hidden">
        <div class="card" style="text-align:center; margin-top:0.7rem;">
          <div style="font-size:1.4rem; font-weight:800;" id="resultLine">—</div>
        </div>
        <button class="btn btn-primary btn-lg btn-block" onclick="next()" style="margin-top:0.7rem;">Next →</button>
      </div>
    </section>

    <section id="end" class="section hidden">
      <div class="big-card">
        <div class="label">FINAL SCORE</div>
        <div class="prompt" id="finalScore">0 / 10</div>
        <div class="sub" id="finalRank">—</div>
      </div>
      <button class="btn btn-primary btn-lg btn-block" onclick="location.reload()">🔁 Play Again</button>
      <a class="btn btn-ghost btn-block" href="index.html" style="margin-top:0.6rem;">← Back to Menu</a>
    </section>
  </main>

    let topic = null;
    let pool = [];
    let leftItem = null, rightItem = null;
    let round = 0, score = 0;
    let totalRounds = 10;
    let answered = false;

    function shuffle(arr) { const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

    function startGame(t) {
      topic = TOPICS[t];
      pool = shuffle(topic.items);
      round = 0; score = 0;
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('play').classList.remove('hidden');
      leftItem = pool.pop();
      next();
    }

    function next() {
      if (round >= totalRounds || pool.length === 0) { endGame(); return; }
      round++;
      answered = false;
      // pick a different value
      let attempts = 0;
      do {
        rightItem = pool.pop();
        attempts++;
      } while (rightItem && rightItem.value === leftItem.value && pool.length > 0 && attempts < 5);
      if (!rightItem) { endGame(); return; }
      document.getElementById('roundPill').textContent = `Round ${round} / ${totalRounds}`;
      document.getElementById('scorePill').textContent = '✅ ' + score;
      document.getElementById('topicLabel').textContent = topic.label.toUpperCase();
      document.getElementById('leftEmoji').textContent = leftItem.emoji;
      document.getElementById('leftName').textContent = leftItem.name;
      document.getElementById('leftValue').textContent = formatValue(leftItem.value);
      document.getElementById('rightEmoji').textContent = rightItem.emoji;
      document.getElementById('rightName').textContent = rightItem.name;
      document.getElementById('rightValue').textContent = '?';
      document.getElementById('guessBtns').classList.remove('hidden');
      document.getElementById('resultBox').classList.add('hidden');
    }

    function formatValue(v) {
      if (topic.unit === '$M') return '$' + v + 'M';
      return v + topic.unit;
    }

    function guess(dir) {
      if (answered) return;
      answered = true;
      const correct = (dir === 'higher' && rightItem.value > leftItem.value)
                   || (dir === 'lower' && rightItem.value < leftItem.value);
      document.getElementById('rightValue').textContent = formatValue(rightItem.value);
      if (correct) score++;
      document.getElementById('resultLine').textContent = correct ? '✅ Correct!' : '❌ Wrong';
      document.getElementById('resultLine').style.color = correct ? '#34d399' : '#f87171';
      document.getElementById('guessBtns').classList.add('hidden');
      document.getElementById('resultBox').classList.remove('hidden');
      // The right item becomes the new left item for next round
      leftItem = rightItem;
    }

    function endGame() {
      document.getElementById('play').classList.add('hidden');
      document.getElementById('end').classList.remove('hidden');
      document.getElementById('finalScore').textContent = score + ' / ' + totalRounds;
      let rank = "👍 Casual fan";
      if (score >= 9) rank = "👑 Disney royalty!";
      else if (score >= 7) rank = "🌟 Walt would be proud";
      else if (score >= 5) rank = "🎢 Solid park-goer";
      else if (score >= 3) rank = "🐭 Just visiting";
      document.getElementById('finalRank').textContent = rank;
    }
