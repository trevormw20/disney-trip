<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a14" />
  <title>Universal Trivia Gauntlet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <div class="topbar">
      <a class="back-btn" href="index.html">← Menu</a>
      <div class="title-bar">⚡ Trivia Gauntlet</div>
      <div style="width:64px;"></div>
    </div>

    <section id="setup" class="section">
      <div class="card">
        <h2 style="margin-bottom:0.6rem;">How to Play</h2>
        <p style="color:var(--muted); font-size:0.95rem; line-height:1.4;">
          Pass the phone for each question. Whoever's turn it is taps an answer. Correct = +1.
        </p>
      </div>

      <h3 style="margin:1.2rem 0 0.6rem; font-size:1rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Players — tap to include</h3>
      <div id="rosterGrid" class="roster-grid"></div>
      <div class="roster-add">
        <input class="field" id="customInput" placeholder="Add a name..." />
        <button class="btn" onclick="addCustom()">+</button>
      </div>
      <div class="roster-actions">
        <button class="btn btn-ghost" onclick="selectAll()">Select All</button>
        <button class="btn btn-ghost" onclick="selectNone()">Clear</button>
      </div>
      <div class="roster-summary" id="rosterSummary">0 players selected</div>

      <div style="margin-top:1rem;">
        <label class="lbl"># of Questions</label>
        <div style="display:flex; gap:0.5rem;">
          <button class="btn btn-ghost" onclick="setQs(10)" id="q10">10</button>
          <button class="btn btn-ghost" onclick="setQs(15)" id="q15">15</button>
          <button class="btn btn-ghost" onclick="setQs(20)" id="q20">20</button>
        </div>
      </div>

      <button class="btn btn-primary btn-lg btn-block" onclick="startGame()" style="margin-top:1rem;">▶ Start Trivia</button>
    </section>

    <section id="play" class="section hidden">
      <div class="stat-row">
        <div class="stat-pill" id="roundPill">Q 1 / 10</div>
        <div class="stat-pill" id="turnPill">👤 Player</div>
      </div>

      <div class="big-card">
        <div class="label" id="diffLabel">EASY</div>
        <div class="prompt" id="qText" style="font-size:clamp(1.2rem, 4.5vw, 1.6rem);">Question</div>
      </div>

      <div id="choices"></div>
      <button class="btn btn-ghost btn-block hidden" id="nextBtn" onclick="nextQ()" style="margin-top:0.7rem;">Next →</button>
    </section>

    <section id="end" class="section hidden">
      <div class="big-card">
        <div class="label">FINAL RESULTS</div>
        <div class="prompt" id="winnerText">🏆</div>
      </div>
      <ol id="scoreboard" class="scoreboard"></ol>
      <button class="btn btn-primary btn-lg btn-block" onclick="location.reload()" style="margin-top:0.8rem;">🔁 Play Again</button>
      <a class="btn btn-ghost btn-block" href="index.html" style="margin-top:0.6rem;">← Back to Menu</a>
    </section>
  </main>

  <script>
    const QUESTIONS = [
      {q:"What's the name of Harry Potter's owl?", choices:["Hedwig","Errol","Crookshanks","Pigwidgeon"], a:0, d:"Easy"},
      {q:"Which house at Hogwarts has a snake symbol?", choices:["Gryffindor","Hufflepuff","Ravenclaw","Slytherin"], a:3, d:"Easy"},
      {q:"What's Hagrid's full first name?", choices:["Rubeus","Reginald","Roger","Rufus"], a:0, d:"Medium"},
      {q:"What position does Harry play in Quidditch?", choices:["Beater","Chaser","Keeper","Seeker"], a:3, d:"Easy"},
      {q:"What's the magical bank in Diagon Alley called?", choices:["Gringotts","Galleon","Knockturn","Hogsmeade"], a:0, d:"Easy"},
      {q:"What dinosaur do you train in Jurassic World?", choices:["T-Rex","Velociraptor","Triceratops","Brachiosaurus"], a:1, d:"Easy"},
      {q:"What's the name of Owen's favorite raptor?", choices:["Charlie","Echo","Delta","Blue"], a:3, d:"Medium"},
      {q:"What island is Jurassic Park set on?", choices:["Isla Sorna","Isla Nublar","Isla Pequena","Isla Muerta"], a:1, d:"Hard"},
      {q:"Who is Mario's brother?", choices:["Luigi","Wario","Toad","Bowser"], a:0, d:"Easy"},
      {q:"What kind of creature is Yoshi?", choices:["Dragon","Dinosaur","Lizard","Frog"], a:1, d:"Easy"},
      {q:"What princess does Mario usually rescue?", choices:["Daisy","Rosalina","Peach","Zelda"], a:2, d:"Easy"},
      {q:"What color is Toad's hat?", choices:["Red and white","Blue and white","Green and white","Yellow and white"], a:0, d:"Easy"},
      {q:"What kind of dragon is Toothless?", choices:["Monstrous Nightmare","Night Fury","Deadly Nadder","Hideous Zippleback"], a:1, d:"Easy"},
      {q:"Who is the chief of the Vikings in How to Train Your Dragon?", choices:["Stoick the Vast","Hiccup","Gobber","Astrid"], a:0, d:"Medium"},
      {q:"What is Shrek?", choices:["Troll","Ogre","Goblin","Giant"], a:1, d:"Easy"},
      {q:"What's Donkey's best friend's name?", choices:["Shrek","Puss","Dragon","Lord Farquaad"], a:0, d:"Easy"},
      {q:"What kind of animal is Po in Kung Fu Panda?", choices:["Bear","Panda","Polar bear","Koala"], a:1, d:"Easy"},
      {q:"Who is Po's father (the goose)?", choices:["Mr. Ping","Master Shifu","Tai Lung","Oogway"], a:0, d:"Medium"},
      {q:"What do the minions love most?", choices:["Apples","Bananas","Strawberries","Oranges"], a:1, d:"Easy"},
      {q:"What's Gru's youngest daughter's name?", choices:["Margo","Edith","Agnes","Lucy"], a:2, d:"Easy"},
      {q:"How many minions are mentioned in the title of Despicable Me?", choices:["None","Many","All","One"], a:1, d:"Hard"},
      {q:"What's the lion's name in Madagascar?", choices:["Alex","Marty","Melman","Gloria"], a:0, d:"Easy"},
      {q:"What kind of animal is King Julien?", choices:["Lemur","Monkey","Sloth","Meerkat"], a:0, d:"Easy"},
      {q:"What does E.T. want to do?", choices:["Go shopping","Phone home","Watch TV","Fly"], a:1, d:"Easy"},
      {q:"What car does Doc Brown turn into a time machine?", choices:["Ford Mustang","DeLorean","Cadillac","Chevy"], a:1, d:"Easy"},
      {q:"What's the year Marty travels back to in Back to the Future?", choices:["1955","1965","1945","1975"], a:0, d:"Medium"},
      {q:"What's Spider-Man's real name?", choices:["Peter Parker","Tony Stark","Bruce Banner","Steve Rogers"], a:0, d:"Easy"},
      {q:"Who turns into the Hulk?", choices:["Tony Stark","Bruce Banner","Peter Parker","Steve Rogers"], a:1, d:"Easy"},
      {q:"What is Bumblebee's vehicle form (often)?", choices:["Camaro","Mustang","Charger","Truck"], a:0, d:"Medium"},
      {q:"Who is the leader of the Autobots?", choices:["Bumblebee","Megatron","Optimus Prime","Starscream"], a:2, d:"Easy"},
      {q:"What does the Cat in the Hat wear?", choices:["A scarf","A red and white striped hat","A bowtie only","A baseball cap"], a:1, d:"Easy"},
      {q:"What does the Lorax speak for?", choices:["The animals","The trees","The water","The mountains"], a:1, d:"Easy"},
      {q:"What is the Grinch trying to steal?", choices:["Halloween","Easter","Christmas","Birthdays"], a:2, d:"Easy"},
      {q:"What kind of monster is in Frankenstein?", choices:["Vampire","Werewolf","Reanimated being","Mummy"], a:2, d:"Easy"},
      {q:"What does Dracula transform into?", choices:["Bat","Wolf","Cat","Snake"], a:0, d:"Easy"},
      {q:"What's the name of the cantina world in Universal's Epic Universe Mario area?", choices:["Mushroom Kingdom","Super Nintendo World","Bowser's Castle","Mario Land"], a:1, d:"Easy"},
      {q:"What's the most famous coaster at Islands of Adventure (newest)?", choices:["VelociCoaster","Hulk","Hagrid's","Storm Force"], a:0, d:"Medium"},
      {q:"At Universal, what does Hagrid's coaster show off?", choices:["Magical creatures","Quidditch","Hogsmeade","Diagon Alley"], a:0, d:"Medium"},
      {q:"Which Universal park has the Hogwarts Express to Hogsmeade?", choices:["USF","Islands of Adventure","Both","Epic Universe"], a:2, d:"Hard"},
      {q:"Who created the Wizarding World book series?", choices:["J.K. Rowling","C.S. Lewis","Roald Dahl","R.L. Stine"], a:0, d:"Easy"},
      {q:"What spell makes things float?", choices:["Lumos","Wingardium Leviosa","Expelliarmus","Alohomora"], a:1, d:"Medium"},
      {q:"What's the name of Hogwarts' ghost house head for Gryffindor?", choices:["Bloody Baron","Fat Friar","Gray Lady","Nearly Headless Nick"], a:3, d:"Hard"},
      {q:"In Trolls, what color is Poppy?", choices:["Pink","Blue","Purple","Green"], a:0, d:"Easy"},
      {q:"In Trolls, what color is Branch (originally)?", choices:["Pink","Blue","Gray","Green"], a:2, d:"Medium"},
      {q:"What is Optimus Prime's truck color?", choices:["Red and blue","Yellow","Black","Green"], a:0, d:"Easy"},
      {q:"What does Mario yell when he jumps?", choices:["Yahoo","Wahoo","Mama mia","All of these"], a:3, d:"Easy"},
      {q:"In Sing, what kind of animal is Buster Moon?", choices:["Koala","Pig","Bear","Mouse"], a:0, d:"Medium"},
      {q:"In Sing, what kind of animal is Rosita?", choices:["Cat","Pig","Sheep","Hippo"], a:1, d:"Medium"},
      {q:"What's the name of the panda movie's villain in the first film?", choices:["Tai Lung","Lord Shen","Kai","Tigress"], a:0, d:"Medium"},
      {q:"How many islands are in Islands of Adventure?", choices:["5","6","7","8"], a:2, d:"Hard"},
      {q:"What new Universal park opened in 2025?", choices:["Volcano Bay","Epic Universe","Islands of Adventure","CityWalk"], a:1, d:"Easy"},
      {q:"In Curious George, what color is the Man's hat?", choices:["Yellow","Red","Blue","Green"], a:0, d:"Easy"},
      {q:"What's the Harry Potter spell to disarm an opponent?", choices:["Expelliarmus","Stupefy","Protego","Expecto Patronum"], a:0, d:"Medium"},
      {q:"Who is Harry Potter's godfather?", choices:["Sirius Black","Remus Lupin","Albus Dumbledore","Arthur Weasley"], a:0, d:"Medium"},
      {q:"What is the name of the three-headed dog in Harry Potter?", choices:["Cerberus","Fluffy","Fang","Padfoot"], a:1, d:"Medium"},
      {q:"What's the name of the Weasley family's owl?", choices:["Errol","Hedwig","Pigwidgeon","Hermes"], a:0, d:"Hard"},
      {q:"Who is the half-giant groundskeeper at Hogwarts?", choices:["Hagrid","Filch","McGonagall","Slughorn"], a:0, d:"Easy"},
      {q:"What kind of creature is Buckbeak?", choices:["Griffin","Hippogriff","Phoenix","Dragon"], a:1, d:"Medium"},
      {q:"In Jurassic World, what hybrid dinosaur is created?", choices:["Indoraptor","Indominus Rex","Scorpios Rex","Megaraptor"], a:1, d:"Medium"},
      {q:"Who plays Owen Grady in Jurassic World?", choices:["Chris Pratt","Chris Evans","Chris Pine","Chris Hemsworth"], a:0, d:"Medium"},
      {q:"In Mario, what does Bowser usually kidnap?", choices:["Princess Peach","Princess Daisy","Rosalina","Toad"], a:0, d:"Easy"},
      {q:"What kind of enemies are the Goombas?", choices:["Turtles","Mushrooms","Plants","Ghosts"], a:1, d:"Easy"},
      {q:"What does Mario get from a Super Mushroom?", choices:["Grows bigger","Shoots fireballs","Gets a star","Flies"], a:0, d:"Easy"},
      {q:"What's the name of Gru's youngest adopted daughter?", choices:["Margo","Edith","Agnes","Lucy"], a:2, d:"Easy"},
      {q:"What is the Minions' language called?", choices:["Minionese","Banana-speak","Yellowish","Gibberish"], a:0, d:"Medium"},
      {q:"Who is Shrek's true love?", choices:["Fiona","Cinderella","Rapunzel","Snow White"], a:0, d:"Easy"},
      {q:"In Shrek, where does the title character live?", choices:["Castle","Swamp","Cave","Forest"], a:1, d:"Easy"},
      {q:"What kind of dragon is Toothless's species?", choices:["Deadly Nadder","Night Fury","Gronckle","Monstrous Nightmare"], a:1, d:"Easy"},
      {q:"In Kung Fu Panda, who is Po's kung fu master?", choices:["Oogway","Shifu","Tigress","Mr. Ping"], a:1, d:"Medium"},
      {q:"In E.T., what candy does Elliott use to lure E.T.?", choices:["M&Ms","Reese's Pieces","Skittles","Smarties"], a:1, d:"Hard"},
      {q:"What's the name of the DeLorean's inventor in Back to the Future?", choices:["Dr. Brown","Dr. Emmett Brown","Doc","All of these"], a:3, d:"Medium"},
      {q:"Who plays Iron Man in the Marvel movies?", choices:["Robert Downey Jr.","Chris Evans","Mark Ruffalo","Jeremy Renner"], a:0, d:"Easy"},
      {q:"What's Captain America's shield made of?", choices:["Steel","Adamantium","Vibranium","Titanium"], a:2, d:"Medium"},
      {q:"In Transformers, what planet are the Autobots from?", choices:["Mars","Cybertron","Krypton","Vulcan"], a:1, d:"Medium"},
      {q:"What's the signature Universal Orlando ride souvenir drink?", choices:["Butterbeer","Pumpkin juice","Dragon punch","Gillywater"], a:0, d:"Easy"},
      {q:"What was Islands of Adventure's opening year?", choices:["1990","1999","2005","2010"], a:1, d:"Hard"},
      {q:"What do wands choose at Ollivanders?", choices:["The wizard","The house","The family","The spell"], a:0, d:"Easy"},
      {q:"In Despicable Me, what is Gru's profession?", choices:["Scientist","Super-villain","Teacher","Spy"], a:1, d:"Easy"},
      {q:"What's the tallest Universal coaster?", choices:["Hulk","Rip Ride Rockit","VelociCoaster","Mummy"], a:1, d:"Medium"},
      {q:"In Jurassic Park, who owns the park?", choices:["John Hammond","Alan Grant","Dennis Nedry","Henry Wu"], a:0, d:"Medium"},
      {q:"What's the name of Hagrid's giant spider?", choices:["Aragog","Mosag","Acromantula","Buckbeak"], a:0, d:"Hard"}
    ];

    const FAMILY = ['Trevor','Niki','Rick','Alicia','Mikey','Mila','Michelle','Millie','Michael','Barbara','Eric','Carrie','Tyler','Tanner','Liam','Ian','Sophie','Lainey','Owen','Mia'];
    const STORAGE_KEY = 'trivia_u_selected';
    const CUSTOM_KEY = 'roster_custom_u';
    const DEFAULT_ON = ['Trevor','Niki'];
    let custom = JSON.parse(localStorage.getItem(CUSTOM_KEY) || '[]');
    let selected = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || JSON.stringify(DEFAULT_ON)));
    let players = [], scores = {}, qQueue = [], qIdx = 0, totalQs = 10, turn = 0, answered = false;

    function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function saveSelected() { localStorage.setItem(STORAGE_KEY, JSON.stringify([...selected])); }
    function saveCustom() { localStorage.setItem(CUSTOM_KEY, JSON.stringify(custom)); }
    function renderRoster() {
      const grid = document.getElementById('rosterGrid');
      grid.innerHTML = '';
      FAMILY.forEach(name => grid.appendChild(makeChip(name, false)));
      custom.forEach((name, i) => grid.appendChild(makeChip(name, true, i)));
      const cnt = [...selected].filter(n => FAMILY.includes(n) || custom.includes(n)).length;
      document.getElementById('rosterSummary').textContent = cnt + ' player' + (cnt===1?'':'s') + ' selected';
    }
    function makeChip(name, isCustom, idx) {
      const c = document.createElement('button');
      c.className = 'chip-toggle' + (selected.has(name) ? ' on' : '') + (isCustom ? ' custom' : '');
      c.onclick = () => toggleName(name);
      c.appendChild(document.createTextNode(name));
      if (isCustom) {
        const x = document.createElement('span');
        x.className = 'x'; x.textContent = '✕';
        x.onclick = (e) => { e.stopPropagation(); custom.splice(idx,1); selected.delete(name); saveCustom(); saveSelected(); renderRoster(); };
        c.appendChild(x);
      }
      return c;
    }
    function toggleName(name) { selected.has(name) ? selected.delete(name) : selected.add(name); saveSelected(); renderRoster(); }
    function addCustom() {
      const input = document.getElementById('customInput');
      const v = input.value.trim();
      if (!v) return;
      if (!custom.includes(v) && !FAMILY.includes(v)) custom.push(v);
      selected.add(v);
      input.value = '';
      saveCustom(); saveSelected(); renderRoster();
    }
    function selectAll() { FAMILY.forEach(n => selected.add(n)); custom.forEach(n => selected.add(n)); saveSelected(); renderRoster(); }
    function selectNone() { selected.clear(); saveSelected(); renderRoster(); }

    function setQs(n) {
      totalQs = n;
      ['q10','q15','q20'].forEach(id => { const el=document.getElementById(id); el.style.background='transparent'; el.style.color='white'; });
      const cur = document.getElementById('q'+n);
      cur.style.background = 'var(--gold)'; cur.style.color = '#1e2a38';
    }
    setQs(10);

    function shuffle(arr) { const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

    function startGame() {
      players = [...FAMILY, ...custom].filter(n => selected.has(n));
      if (players.length < 1) { alert('Pick at least 1 player.'); return; }
      scores = {}; players.forEach(p => scores[p] = 0);
      qQueue = shuffle(QUESTIONS).slice(0, totalQs);
      qIdx = 0; turn = 0;
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('play').classList.remove('hidden');
      showQ();
    }

    function showQ() {
      if (qIdx >= qQueue.length) { endGame(); return; }
      answered = false;
      const q = qQueue[qIdx];
      document.getElementById('roundPill').textContent = `Q ${qIdx+1} / ${qQueue.length}`;
      document.getElementById('turnPill').textContent = '👤 ' + players[turn];
      document.getElementById('diffLabel').textContent = q.d.toUpperCase();
      document.getElementById('qText').textContent = q.q;
      const ch = document.getElementById('choices');
      ch.innerHTML = '';
      const indices = q.choices.map((_,i) => i);
      const order = shuffle(indices);
      order.forEach(origIdx => {
        const b = document.createElement('button');
        b.className = 'choice a';
        b.textContent = q.choices[origIdx];
        b.onclick = () => answer(b, origIdx === q.a);
        ch.appendChild(b);
      });
      document.getElementById('nextBtn').classList.add('hidden');
    }

    function answer(btn, correct) {
      if (answered) return;
      answered = true;
      const allBtns = document.querySelectorAll('#choices .choice');
      const q = qQueue[qIdx];
      allBtns.forEach((b) => {
        b.style.pointerEvents = 'none';
        if (b.textContent === q.choices[q.a]) b.classList.add('correct');
      });
      if (!correct) btn.classList.add('wrong');
      else scores[players[turn]]++;
      document.getElementById('nextBtn').classList.remove('hidden');
    }

    function nextQ() { qIdx++; turn = (turn + 1) % players.length; showQ(); }

    function endGame() {
      document.getElementById('play').classList.add('hidden');
      document.getElementById('end').classList.remove('hidden');
      const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
      const max = sorted[0][1];
      const winners = sorted.filter(([_,v]) => v === max).map(([n]) => n);
      document.getElementById('winnerText').textContent = '🏆 ' + winners.join(' & ');
      const list = document.getElementById('scoreboard');
      list.innerHTML = sorted.map(([n,v]) => `<li>${escapeHtml(n)}<span class="pts">${v} pt${v===1?'':'s'}</span></li>`).join('');
    }

    renderRoster();
  </script>
</body>
</html>
