  <link rel="stylesheet" href="style.css" />

  <main>
    <div class="topbar">
      <a class="back-btn" href="index.html">вҶҗ Menu</a>
      <div class="title-bar">рҹҺ¬ Emoji Movie</div>
      <div style="width:64px;"></div>
    </div>

    <section id="setup" class="section">
      <div class="card">
        <h2 style="margin-bottom:0.6rem;">How to Play</h2>
        <p style="color:var(--muted); font-size:0.95rem; line-height:1.4;">
          Phone shows an emoji puzzle. First person to shout the right answer wins the round вҖ” tap "Reveal" to confirm.
        </p>
      </div>

      <h3 style="margin:1.2rem 0 0.5rem; font-size:1rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Pick a Category</h3>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:0.5rem;">
        <button class="btn btn-ghost" onclick="pickCategory('movies')" id="cat-movies">рҹҺ¬ Movies</button>
        <button class="btn btn-ghost" onclick="pickCategory('characters')" id="cat-characters">рҹ§‘вҖҚрҹҺӨ Characters</button>
        <button class="btn btn-ghost" onclick="pickCategory('all')" id="cat-all">рҹҺІ All</button>
      </div>

      <button class="btn btn-primary btn-lg btn-block" onclick="startGame()" style="margin-top:1rem;">в–¶ Start</button>
    </section>

    <section id="play" class="section hidden">
      <div class="stat-row">
        <div class="stat-pill" id="roundPill">Puzzle 1</div>
        <div class="stat-pill" id="diffPill">вӯҗ</div>
      </div>

      <div class="big-card">
        <div class="label" id="playLabel">DECODE THIS MOVIE</div>
        <div class="prompt" id="emojiText" style="font-size:clamp(3rem, 14vw, 5rem); line-height:1.4;">рҹҺ¬</div>
        <div class="sub" id="hintText"></div>
      </div>

      <div class="reveal-area" id="answer">Tap reveal</div>

      <div class="btn-row">
        <button class="btn btn-warn btn-lg" id="hintBtn" onclick="showHint()">рҹ’Ў Hint</button>
        <button class="btn btn-success btn-lg" onclick="reveal()">вңЁ Reveal</button>
      </div>
      <button class="btn btn-primary btn-lg btn-block" onclick="next()" style="margin-top:0.7rem;">Next вҶ’</button>
      <button class="btn btn-ghost btn-block" onclick="endGame()" style="margin-top:0.6rem;">End Game</button>
    </section>

    <section id="end" class="section hidden">
      <div class="big-card">
        <div class="label">GAME OVER</div>
        <div class="prompt">рҹҺ¬ Thanks for playing!</div>
        <div class="sub" id="rounds"></div>
      </div>
      <button class="btn btn-primary btn-lg btn-block" onclick="location.reload()">рҹ”Ғ Play Again</button>
      <a class="btn btn-ghost btn-block" href="index.html" style="margin-top:0.6rem;">вҶҗ Back to Menu</a>
    </section>
  </main>

    let PUZZLES = MOVIE_PUZZLES;
    let selectedCategory = 'movies';

    function pickCategory(cat) {
      selectedCategory = cat;
      ['cat-movies','cat-characters','cat-all'].forEach(id => {
        const el = document.getElementById(id);
        el.style.background = 'transparent';
        el.style.color = 'white';
      });
      const sel = document.getElementById('cat-' + cat);
      sel.style.background = 'var(--gold)';
      sel.style.color = '#1e2a38';
      if (cat === 'movies')     PUZZLES = MOVIE_PUZZLES;
      else if (cat === 'characters') PUZZLES = CHARACTER_PUZZLES;
      else PUZZLES = MOVIE_PUZZLES.concat(CHARACTER_PUZZLES);
    }
    pickCategory('movies');

    let queue = [], current = null, count = 0;

    function shuffle(arr) { const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

    function startGame() {
      queue = shuffle(PUZZLES); count = 0;
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('play').classList.remove('hidden');
      next();
    }

    function next() {
      if (queue.length === 0) queue = shuffle(PUZZLES);
      current = queue.pop(); count++;
      document.getElementById('roundPill').textContent = 'Puzzle ' + count;
      document.getElementById('diffPill').textContent = 'вӯҗ'.repeat(current.d);
      document.getElementById('emojiText').textContent = current.emoji;
      document.getElementById('hintText').textContent = '';
      document.getElementById('answer').textContent = 'Tap reveal';
      document.getElementById('answer').classList.add('hidden-text');
      document.getElementById('hintBtn').disabled = false;
      const labelText = selectedCategory === 'characters' ? 'GUESS THIS CHARACTER'
                       : selectedCategory === 'all' ? 'DECODE THIS CLUE'
                       : 'DECODE THIS MOVIE';
      const lbl = document.getElementById('playLabel');
      if (lbl) lbl.textContent = labelText;
    }

    function showHint() {
      document.getElementById('hintText').textContent = 'рҹ’Ў ' + current.hint;
      document.getElementById('hintBtn').disabled = true;
    }

    function reveal() {
      document.getElementById('answer').textContent = current.answer;
      document.getElementById('answer').classList.remove('hidden-text');
    }

    function endGame() {
      document.getElementById('play').classList.add('hidden');
      document.getElementById('end').classList.remove('hidden');
      document.getElementById('rounds').textContent = count + ' puzzle' + (count===1?'':'s') + ' played';
    }
